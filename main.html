<!DOCTYPE html>
<html>
<head>
    <title>Book Library</title>
    <style>
        body {
            background-color: #f8f8f8;
            font-family: Arial, sans-serif;
        }

        .book-library {
            background-color: #ffffff;
            width: 400px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }

        .book {
            background-color: #f1f1f1;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .book img {
            width: 150px;
            height: auto;
        }

        .book h2 {
            font-size: 16px;
            margin: 10px 0 5px 0;
        }

        .author {
            color: #777777;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .price-block {
            background-color: #2ecc71;
            color: #ffffff;
            padding: 6px;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="book-library">
        <h1>Book Library</h1>

        <div class="book">
            <img src="https://www.bookgeeks.in/wp-content/uploads/2018/01/Spy-in-the-Amber-by-Manohar-Malgonkar.jpg" alt="Spy in the Amber">
            <h2>Spy in the Amber</h2>
            <p class="author">by Manohar Malgonkar</p>
            <div class="price-block">Rs. 299</div>
        </div>

        <div class="book">
            <img src="https://www.bookgeeks.in/wp-content/uploads/2018/01/Sacred-Games-by-Vikram-Chandra.jpg" alt="Sacred Games">
            <h2>Sacred Games</h2>
            <p class="author">by Vikram Chandra</p>
            <div class="price-block">Rs. 399</div>
        </div>

        <div class="book">
            <img src="https://www.bookgeeks.in/wp-content/uploads/2018/01/Byomkesh-Bakshi-by-Sharadindu-Bandyopadhyay.jpg" alt="Byomkesh Bakshi">
            <h2>Byomkesh Bakshi</h2>
            <p class="author">by Sharadindu Bandyopadhyay</p>
            <div class="price-block">Rs. 199</div>
        </div>

    </div>

</body>
</html>
